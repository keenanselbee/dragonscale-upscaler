[Upscaling]

; Enable DragonScale's render hooks and upscaling path.
; 0 = Disabled, 1 = Enabled.
Enabled = 1

; Upscaling method. The first implementation path supports FSR2 upscaling only.
; Valid values: None, FSR2.
Method = FSR2

; Upscaling quality preset.
; Valid values: NativeAA, Quality, Balanced, Performance, UltraPerformance.
Quality = Quality

; FSR sharpening strength.
; Valid range: 0.0-1.0.
Sharpness = 0.5

; Texture mip LOD bias. Auto follows the selected render scale; Off disables DragonScale biasing.
; Valid values: Auto, Off, or a value from -8.0 to 0.0.
MipBias = Auto

; FSR camera FOV in Skyrim/game horizontal degrees. DragonScale converts numeric values to vertical FOV for FSR.
; Use 0 or Auto to read Skyrim's active vertical FOV.
FsrFov = Auto

; Conservative DX11 shader path for FSR context creation.
; Valid values: Auto, 5.1, 6.0, 6.1, 6.2, 6.3, 6.4, 6.5, 6.6, 6.7.
FsrForceShaderModel = 5.1

; Allow FSR FP16 shader permutations.
; 0 = Disabled, 1 = Enabled.
FsrAllowFP16 = 0

; Allow FSR wave64 shader permutations when the backend reports support.
; 0 = Disabled, 1 = Enabled.
FsrAllowWave64 = 0

; FSR HDR context flag. Auto follows the current render-window format.
; Valid values: Auto, 0, 1.
FsrHdr = Auto

; Enable FSR auto exposure.
; 0 = Disabled, 1 = Enabled.
FsrAutoExposure = 1

; Tell FSR the input depth buffer is inverted.
; 0 = Disabled, 1 = Enabled.
FsrDepthInverted = 0

; Enable FidelityFX runtime debug checks and messages.
; 0 = Disabled, 1 = Enabled.
FsrDebug = 0

; Native-resolution antialiasing is reserved for a later backend; FSR2 uses Quality when this is enabled.
; 0 = Disabled, 1 = Enabled.
NativeAA = 0

; Reset FSR history when Skyrim closes the loading menu.
; 0 = Disabled, 1 = Enabled.
ResetOnLoadingMenu = 1

; Enable renderer-slot resource discovery with a future texture-discovery fallback path.
; 0 = Disabled, 1 = Enabled.
UseTextureDiscoveryFallback = 1

; Encode reactive and transparency/composition masks when source masks are available.
; 0 = Disabled, 1 = Enabled.
EncodeReactiveMasks = 1


[Compatibility]

; ENB compatibility mode.
; Valid values: Auto, ForceCompatible, Off.
ENBMode = Auto


; Prefer Skyrim render-target hooks instead of wrapping the swap chain.
; 0 = Disabled, 1 = Enabled.
PreferEngineRenderHooks = 1

; Clamp scissor rectangles to DragonScale's active render size when compatibility patching is available.
; 0 = Disabled, 1 = Enabled.
PatchScissorRects = 1

; Keep facegen/customization texture generation at native resolution when compatibility patching is available.
; 0 = Disabled, 1 = Enabled.
PatchFaceGenNative = 1

; Keep precipitation rendering at native resolution when compatibility patching is available.
; 0 = Disabled, 1 = Enabled.
PatchPrecipitationNative = 1

; Force Skyrim FXAA off while DragonScale is loaded.
; 0 = Disabled, 1 = Enabled.
ForceFXAAOff = 1

; Repair full-resolution auxiliary buffers after successful upscaling.
; Disable individual passes to isolate ENB/lighting artifacts.
; 0 = Disabled, 1 = Enabled.
RepairAuxiliaryBuffers = 0
RepairDepth = 0
RepairSAOCameraZ = 0
RepairRefractionNormals = 0
RepairUnderwaterMask = 0
PreserveMainAlpha = 1

; Add UAV/copy access to render targets DragonScale needs when Skyrim creates them.
; Requires a game restart after changing this value.
; 0 = Disabled, 1 = Enabled.
PatchRenderTargetAccess = 0

; Let FSR write directly to Skyrim's main scene target when UAV access exists.
; If unavailable, DragonScale falls back to an owned output texture and copy-back path.
; 0 = Disabled, 1 = Enabled.
UseDirectMainOutput = 0

; ReShade runtime integration mode. Reserved for a later pass.
; Valid values: Off, BeforeUpscale, AfterUpscale, UnderUI.
ReShadeMode = Off


[Debug]

; SKSE plugin logging verbosity.
; Valid values: Off, Info, Verbose.
LogLevel = Verbose

; Development pipeline mode for isolating rendering issues.
; CaptureOnly logs resources and lets vanilla rendering continue.
; CopyThrough copies the selected source through DragonScale-owned textures without FSR2.
; FSR2 runs the real upscaler path.
; Valid values: CaptureOnly, CopyThrough, FSR2.
PipelineMode = ScaleCopy

; Select which captured color/output resources DragonScale uses.
; Valid values: Auto, RendererSlot, ImageSpace.
SourceMode = RendererSlot

; Select the output path.
; OwnedCopyBack is the safest diagnostic path. DirectMain requires target UAV access.
; Valid values: OwnedCopyBack, DirectMain.
OutputMode = OwnedCopyBack

; Select how DragonScale restores downstream Skyrim render state.
; Valid values: None, Conservative, NativeImmediately, NativeAfterImageSpace.
RestoreMode = NativeImmediately

; Reserved frame dump switch for deep diagnostics.
; 0 = Disabled, 1 = Enabled.
DumpFrame = 0

; Show the development diagnostics overlay at startup.
; 0 = Hidden, 1 = Visible.
Overlay = 0

; Keyboard shortcut that toggles the diagnostics overlay at runtime.
; Use None to disable. Examples: Pause, Ctrl+Shift+F12, F10, Alt+F11.
OverlayToggleHotkey = Pause

; Diagnostics overlay position.
; Valid values: TopLeft.
OverlayPosition = TopLeft

; Diagnostics overlay text scale.
; Valid range: 0.5-4.0.
OverlayScale = 1.0

; Enable non-blocking D3D11 timestamp queries for FSR dispatch GPU timing.
; 0 = Disabled, 1 = Enabled.
OverlayGpuTiming = 1

; Milliseconds between diagnostics log lines while overlay or verbose logging is active.
; Valid range: 100-60000.
OverlayLogInterval = 1000
